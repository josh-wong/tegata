version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scalardl
      POSTGRES_USER: scalardl
      POSTGRES_PASSWORD: scalardl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalardl"]
      interval: 5s
      timeout: 5s
      retries: 10

  scalardl-ledger:
    image: ghcr.io/scalar-labs/scalardl-ledger:3.12.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SCALAR_DL_LEDGER_STORAGE_JDBC_URL: jdbc:postgresql://postgres:5432/scalardl
      SCALAR_DL_LEDGER_STORAGE_JDBC_USERNAME: scalardl
      SCALAR_DL_LEDGER_STORAGE_JDBC_PASSWORD: scalardl
      SCALAR_DL_LEDGER_SERVER_GRPC_PORT: 50051
      SCALAR_DL_LEDGER_SERVER_PRIVILEGED_PORT: 50052
      SCALAR_DL_LEDGER_AUTHENTICATION_METHOD: digital-signature
    ports:
      - "50051:50051"
      - "50052:50052"
    command: ["--bootstrap"]
