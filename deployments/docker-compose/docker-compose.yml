version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scalardl
      POSTGRES_USER: scalardl
      POSTGRES_PASSWORD: scalardl
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalardl"]
      interval: 5s
      timeout: 5s
      retries: 10

  scalardl-schema-loader:
    image: ghcr.io/scalar-labs/scalardl-schema-loader:3.12.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SCALAR_DB_STORAGE: jdbc
      SCALAR_DB_CONTACT_POINTS: jdbc:postgresql://postgres:5432/scalardl
      SCALAR_DB_USERNAME: scalardl
      SCALAR_DB_PASSWORD: scalardl
      SCHEMA_TYPE: ledger
    command: ["--config=/tmp/database.properties"]
    restart: on-failure

  scalardl-ledger:
    image: ghcr.io/scalar-labs/scalardl-ledger:3.12.0
    depends_on:
      postgres:
        condition: service_healthy
      scalardl-schema-loader:
        condition: service_completed_successfully
    environment:
      SCALAR_DB_STORAGE: jdbc
      SCALAR_DB_CONTACT_POINTS: jdbc:postgresql://postgres:5432/scalardl
      SCALAR_DB_USERNAME: scalardl
      SCALAR_DB_PASSWORD: scalardl
      SCALAR_DL_LEDGER_AUTHENTICATION_METHOD: digital-signature
      SCALAR_DL_LEDGER_TX_STATE_MANAGEMENT_ENABLED: "false"
    ports:
      - "50051:50051"
      - "50052:50052"
